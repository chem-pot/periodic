<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주기율표 시뮬레이션</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh;
            color: white;
            padding: 20px;
        }

        h1 {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 10px;
            color: #e0e0ff;
            text-shadow: 0 0 20px rgba(100,150,255,0.5);
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .legend-color {
            width: 22px;
            height: 22px;
            border-radius: 5px;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .table-wrapper { overflow-x: auto; padding-bottom: 10px; }

        .periodic-table {
            display: grid;
            grid-template-columns: 36px repeat(18, 52px);
            gap: 3px;
            margin: 0 auto;
            width: fit-content;
        }

        .period-label, .group-label {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            color: #ccd;
            font-weight: bold;
            background: rgba(255,255,255,0.07);
            border-radius: 4px;
        }

        .group-label { height: 28px; }
        .period-label { height: 60px; }
        .period-label.short { height: 28px; }

        .element {
            height: 60px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: transform 0.15s, box-shadow 0.15s;
            border: 1px solid rgba(255,255,255,0.15);
            padding: 2px;
        }

        .element:hover {
            transform: scale(1.2);
            box-shadow: 0 0 20px rgba(255,255,255,0.6);
            z-index: 10;
            position: relative;
        }

        .element .num { font-size: 0.58rem; opacity: 0.85; align-self: flex-start; margin-left: 3px; }
        .element .sym { font-size: 1.15rem; font-weight: bold; line-height: 1; }
        .element .kor { font-size: 0.52rem; opacity: 0.9; margin-top: 1px; }
        .element .mas { font-size: 0.48rem; opacity: 0.75; }

        /* ===== 3가지 색상만 ===== */
        .metal     { background: linear-gradient(135deg, #1a6eb5, #0d4a8a); }
        .metalloid { background: linear-gradient(135deg, #8e44ad, #6c3483); }
        .nonmetal  { background: linear-gradient(135deg, #1a9e6e, #0e6b4a); }

        /* 모달 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.75);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }

        .modal {
            background: linear-gradient(135deg, #1e3a5f, #0d2137);
            border: 2px solid rgba(100,150,255,0.4);
            border-radius: 16px;
            padding: 28px;
            max-width: 440px;
            width: 92%;
            box-shadow: 0 0 40px rgba(50,100,255,0.3);
            position: relative;
            animation: pop 0.22s ease;
        }

        @keyframes pop {
            from { transform: scale(0.8); opacity: 0; }
            to   { transform: scale(1);   opacity: 1; }
        }

        .modal-close {
            position: absolute;
            top: 12px; right: 16px;
            background: none; border: none;
            color: white; font-size: 1.5rem;
            cursor: pointer; opacity: 0.7;
        }
        .modal-close:hover { opacity: 1; }

        .modal-header {
            display: flex;
            align-items: center;
            gap: 18px;
            margin-bottom: 20px;
        }

        .modal-symbol-box {
            width: 82px; height: 82px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(255,255,255,0.3);
            flex-shrink: 0;
        }

        .modal-symbol-box .m-num { font-size: 0.78rem; margin-bottom: 2px; opacity:0.85; }
        .modal-symbol-box .m-sym { font-size: 2.2rem; font-weight: bold; line-height: 1; }

        .modal-title h2 { font-size: 1.45rem; color: #e0e8ff; }
        .modal-title .m-kr { font-size: 1rem; color: #aac; margin-top: 3px; }
        .modal-title .m-type { font-size: 0.8rem; margin-top: 6px; padding: 3px 10px; border-radius: 20px; display: inline-block; font-weight: bold; }

        .type-metal    { background: rgba(26,110,181,0.5); color:#7fc8ff; }
        .type-metalloid{ background: rgba(142,68,173,0.5); color:#d7a8f5; }
        .type-nonmetal { background: rgba(26,158,110,0.5); color:#7febb0; }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .info-card {
            background: rgba(255,255,255,0.07);
            border-radius: 8px;
            padding: 9px 13px;
        }
        .info-card .lbl { font-size: 0.68rem; color: #99aacc; margin-bottom: 3px; }
        .info-card .val { font-size: 0.95rem; font-weight: bold; color: #ddeeff; }

        .placeholder {
            height: 60px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.55rem;
            text-align: center;
            opacity: 0.55;
            border: 1px dashed rgba(255,255,255,0.3);
            line-height: 1.4;
        }
    </style>
</head>

    metal:     '금속 원소',
    metalloid: '준금속 원소',
    nonmetal:  '비금속 원소',
};
const catTypeClass = {
    metal:     'type-metal',
    metalloid: 'type-metalloid',
    nonmetal:  'type-nonmetal',
};

// 그리드 위치 계산
// 전체 그리드: 19열(라벨+18족) x 13행(족라벨+7주기+빈행+란타+악티)
function getPos(el) {
    const { period, group } = el;
    if (typeof group === 'number') {
        return { row: period + 1, col: group + 1 };
    } else if (group === '란') {
        return { row: 11, col: el.z - 57 + 4 };
    } else {
        return { row: 12, col: el.z - 89 + 4 };
    }
}

function buildTable() {
    const table = document.getElementById('periodicTable');
    // 13행: 1=족라벨, 2~8=주기1~7, 9=빈행, 10=란타넘족 라벨행, 11=란타넘, 12=악티늄
    table.style.gridTemplateRows =
        '28px repeat(7,60px) 14px 28px 60px 60px';

    // ── 족 라벨 (1행) ──
    const corner = document.createElement('div');
    corner.style.gridColumn = '1';
    corner.style.gridRow = '1';
    table.appendChild(corner);

    for (let g = 1; g <= 18; g++) {
        const lbl = document.createElement('div');
        lbl.className = 'group-label';
        lbl.textContent = g + '족';
        lbl.style.gridColumn = g + 1;
        lbl.style.gridRow = '1';
        table.appendChild(lbl);
    }

    // ── 주기 라벨 (2~8행) ──
    for (let p = 1; p <= 7; p++) {
        const lbl = document.createElement('div');
        lbl.className = 'period-label';
        lbl.textContent = p + '주기';
        lbl.style.gridColumn = '1';
        lbl.style.gridRow = p + 1;
        table.appendChild(lbl);
    }

    // ── 빈 구분행 (9행) 아무것도 안 넣음 ──

    // ── 란타넘족 / 악티늄족 행 제목 (10행) ──
    const lanTitleCell = document.createElement('div');
    lanTitleCell.style.gridColumn = '1 / 4';
    lanTitleCell.style.gridRow = '10';
    lanTitleCell.style.display = 'flex';
    lanTitleCell.style.alignItems = 'center';
    lanTitleCell.style.justifyContent = 'flex-end';
    lanTitleCell.style.paddingRight = '6px';
    lanTitleCell.style.gap = '0';
    lanTitleCell.innerHTML = `
        <div style="font-size:0.62rem;color:#aac;text-align:right;line-height:1.5;">
            <div style="color:#7fc8ff;">▶ 란타넘족 (6주기)</div>
            <div style="color:#7febb0;">▶ 악티늄족 (7주기)</div>
        </div>`;
    table.appendChild(lanTitleCell);

    // 란타넘족 라벨(10행) 족 번호
    for (let i = 0; i < 15; i++) {
        const lbl = document.createElement('div');
        lbl.style.gridColumn = i + 4;
        lbl.style.gridRow = '10';
        lbl.style.display = 'flex';
        lbl.style.alignItems = 'center';
        lbl.style.justifyContent = 'center';
        lbl.style.fontSize = '0.58rem';
        lbl.style.color = '#7fc8ff';
        lbl.textContent = (57 + i) + '번';
        table.appendChild(lbl);
    }

    // ── 주기율표 본체에 란타/악티 자리 표시칸 ──
    const lanPH = document.createElement('div');
    lanPH.className = 'placeholder metal';
    lanPH.style.gridColumn = '4';
    lanPH.style.gridRow = '7';
    lanPH.style.background = 'rgba(26,110,181,0.25)';
    lanPH.innerHTML = '<span>57~71<br>란타넘족</span>';
    table.appendChild(lanPH);

    const actPH = document.createElement('div');
    actPH.className = 'placeholder metal';
    actPH.style.gridColumn = '4';
    actPH.style.gridRow = '8';
    actPH.style.background = 'rgba(26,110,181,0.25)';
    actPH.innerHTML = '<span>89~103<br>악티늄족</span>';
    table.appendChild(actPH);

    // ── 원소 배치 ──
    elements.forEach(el => {
        const pos = getPos(el);
        const div = document.createElement('div');
        div.className = `element ${el.cat}`;

        let rowNum;
        if (typeof el.group === 'number') rowNum = el.period + 1;
        else if (el.group === '란') rowNum = 11;
        else rowNum = 12;

        div.style.gridColumn = pos.col;
        div.style.gridRow = rowNum;

        const massStr = typeof el.mass === 'number'
            ? (el.mass < 10 ? el.mass.toFixed(3) : el.mass < 100 ? el.mass.toFixed(2) : el.mass.toFixed(0))
            : el.mass;

        div.innerHTML = `
            <span class="num">${el.z}</span>
            <span class="sym">${el.sym}</span>
            <span class="kor">${el.kr}</span>
            <span class="mas">${massStr}</span>`;

        div.addEventListener('click', () => openModal(el));
        table.appendChild(div);
    });
}

function groupLabel(el) {
    if (typeof el.group === 'number') return el.group + '족';
    if (el.group === '란') return '란타넘족 계열 (3족 위치)';
    return '악티늄족 계열 (3족 위치)';
}

function openModal(el) {
    document.getElementById('mSymBox').className = `modal-symbol-box ${el.cat}`;
    document.getElementById('mNum').textContent = el.z;
    document.getElementById('mSym').textContent = el.sym;
    document.getElementById('mNameEn').textContent = el.en;
    document.getElementById('mNameKr').textContent = el.kr;

    const typeEl = document.getElementById('mType');
    typeEl.textContent = catLabel[el.cat];
    typeEl.className = `m-type ${catTypeClass[el.cat]}`;

    document.getElementById('mMass').textContent = el.mass + ' u';
    document.getElementById('mPG').textContent = `${el.period}주기 / ${groupLabel(el)}`;
    document.getElementById('mConfig').textContent = el.config;
    document.getElementById('mState').textContent = el.state;
    document.getElementById('mBoil').textContent = el.boil === '-' ? '미확인' : el.boil + ' °C';
    document.getElementById('mMelt').textContent = el.melt === '-' ? '미확인' : el.melt + ' °C';
    document.getElementById('mEneg').textContent = el.eneg === '-' ? '미확인' : el.eneg;
    document.getElementById('mYear').textContent = el.year;

    document.getElementById('modalOverlay').classList.add('active');
}

function closeModal(e) {
    if (e.target === document.getElementById('modalOverlay'))
        document.getElementById('modalOverlay').classList.remove('active');
}
function closeModalBtn() {
    document.getElementById('modalOverlay').classList.remove('active');
}

buildTable();
</script>
</body>
</html>
